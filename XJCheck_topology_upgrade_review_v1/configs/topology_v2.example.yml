schema_version: "2.0.0"

project:
  profile_sources:
    - prj
    - terminal_xml
    - filename
    - title_block
  stable_sheet_key: [sheet_order, file_sha256]
  page_number_is_unique: false
  incomplete_project_policy: block_clean_conclusion
  audit_media:
    - electrical_wire
    - logical_reference
  review_media:
    - ethernet
    - optical_fiber
    - serial_bus
    - time_sync

reader:
  backend_priority:
    - oda_file_converter
    - realdwg
    - oda_drawings_sdk
    - libredwg
    - dxf_only
  oda_file_converter:
    configured_path: ""
    environment_variable: ODA_FILE_CONVERTER
    search_path: true
    windows_candidates:
      - "C:/Program Files/ODA/ODAFileConverter 27.1.0/ODAFileConverter.exe"
      - "C:/Program Files/ODA/ODAFileConverter 26.9.0/ODAFileConverter.exe"
    linux_candidates:
      - "/opt/oda/ODAFileConverter"
      - "~/.local/bin/ODAFileConverter"
    convert_version: R2018
    audit_before_load: true
    recursive: false
    timeout_seconds: 180
  capability_gate:
    require_entities_for_audit_pages: true
    require_blocks: false
    require_xdata: false
    fail_on_zero_entities: true
    fail_on_partial_conversion_ratio: 0.05

page_profile:
  mode: multilabel
  labels:
    - wire_schematic
    - terminal_table
    - component_wiring
    - backplate
    - communication
    - layout
    - metadata_only
  use_sidecar_priors: true
  unknown_page_policy: review_profile
  never_create_code_branch_from_filename_only: true

primitive_model:
  include_entities:
    - LINE
    - LWPOLYLINE
    - POLYLINE
    - ARC
    - CIRCLE
    - INSERT
    - ATTRIB
    - TEXT
    - MTEXT
  preserve_entity_handle: true
  preserve_parent_handle: true
  preserve_block_nesting_path: true
  explode_block_geometry_for_fingerprinting: true
  connect_exploded_block_geometry_directly: false
  normalize_to_world_coordinates: true
  retain_local_coordinates: true

topology:
  coordinate_normalization:
    preferred_scale_reference: median_text_height
    fallback_scale_reference: drawing_extents
  endpoint_snap:
    absolute_tolerance: 0.8
    relative_to_text_height: 0.25
    require_layer_compatibility: false
  endpoint_on_segment:
    perpendicular_tolerance: 0.6
    endpoint_margin: 0.2
  crossings:
    crossing_without_dot: POSSIBLE
    crossing_with_explicit_dot: ASSERTED
    endpoint_at_crossing: ASSERTED
    bridge_arc_crossing: REJECTED
  collinear_overlap:
    minimum_overlap: 0.5
    state: ASSERTED
  gap_candidates:
    enabled: true
    maximum_gap_absolute: 15.0
    maximum_gap_relative_to_text_height: 5.0
    maximum_angle_delta_deg: 2.0
    text_alone_may_assert: false
    block_center_alone_may_assert: false
    require_one_of:
      - verified_symbol_pass_through
      - repeated_project_pattern
      - high_confidence_constraint_solution
  decisions:
    states: [ASSERTED, POSSIBLE, REJECTED, UNKNOWN]
    assert_threshold: 0.995
    reject_threshold: 0.02
    materialize_network_states: [ASSERTED]
    retain_alternatives: true
  network_validation:
    flag_high_degree_without_junction_symbol: true
    flag_large_network_from_single_possible_bridge: true
    flag_open_endpoint_near_symbol_port: true
    never_auto_repair_after_validation: true

symbols:
  library_paths:
    - configs/symbols/core.yml
    - configs/symbols/project_overrides.yml
  unknown_symbol_policy: preserve_and_review
  fingerprint:
    definition_hash: true
    primitive_histogram: true
    normalized_bbox: true
    port_touch_clusters: true
    attribute_tags: true
  port_binding:
    top_k: 5
    maximum_distance_relative_to_text_height: 1.0
    direction_alignment_weight: 0.25
    touch_distance_weight: 0.45
    repeated_pattern_weight: 0.15
    symbol_verification_weight: 0.15
  verified_symbol_rules_override_model: true

semantics:
  neighborhood_use:
    candidate_generation: true
    connectivity_decision: false
    final_pair_decision: false
  token_roles:
    - terminal_number
    - wire_number
    - device_tag
    - port_number
    - page_reference
    - scoped_prefix
    - annotation
    - unknown
  candidate_top_k: 8
  use_terminal_strip_vocabulary: true
  use_page_category_prior: true
  attachment_features:
    - distance_to_open_endpoint
    - distance_to_symbol_port
    - branch_direction_alignment
    - inside_verified_text_slot
    - same_row
    - same_column
    - layer
    - text_height
    - scoped_prefix
    - repeated_project_pattern

constraints:
  backend: ortools_cp_sat
  timeout_seconds_per_project: 120
  preserve_second_best_solution: true
  review_if_objective_gap_below: 0.03
  hard:
    one_primary_network_per_symbol_port: true
    one_primary_terminal_identity_per_endpoint: true
    rejected_topology_edge_must_not_connect: true
    verified_internal_connectivity_must_hold: true
    audit_page_with_zero_entities_must_not_pass: true
  soft:
    prefer_reciprocal_cross_page_match: 3.0
    prefer_unique_text_attachment: 2.0
    prefer_verified_symbol_port: 4.0
    penalize_possible_bridge: 2.5
    penalize_cross_medium_match: 10.0

cross_page:
  endpoint_types:
    - open_network_endpoint
    - verified_symbol_port
    - interruption_marker
    - table_terminal_endpoint
  canonical_identity_fields:
    - terminal_strip_scope
    - terminal_number
    - connection_medium
    - direction
  bare_number_match_allowed: false
  reciprocal_required_by_default: false
  allow_project_rule_overrides: true
  candidate_top_k: 10

confidence:
  components:
    - reader
    - extraction
    - geometry
    - junction
    - symbol
    - port_binding
    - network
    - semantic_attachment
    - cross_page
    - audit
  automatic_issue_minimum: 0.985
  review_minimum: 0.70
  ambiguous_solution_requires_review: true
  weakest_link_aggregation: true

rules:
  scheme: conservative_power_drawing
  automatic:
    - XJ-NET-001
    - XJ-XPAGE-001
    - XJ-XPAGE-002
  review:
    - XJ-NET-010
    - XJ-SYM-010
    - XJ-SEM-010
    - XJ-XPAGE-010
  suppress_when:
    - incomplete_reader_run
    - unresolved_topology_boundary
    - unresolved_symbol_port
    - near_equal_constraint_solutions

legacy:
  neighborhood_engine:
    mode: shadow
    allow_text_candidate_generation: true
    allow_connectivity_decision: false
    allow_final_pair: false
  compare_legacy_and_v2: true
  retain_legacy_artifacts: true

learning:
  enabled: false
  mode: shadow
  allowed_tasks:
    - segment_role_ranking
    - junction_candidate_ranking
    - gap_bridge_ranking
    - symbol_family_ranking
    - text_attachment_ranking
  forbidden_tasks:
    - direct_network_materialization
    - direct_critical_issue_generation
  calibration_required: true
  evaluation_split: held_out_project

report:
  write_findings_v2: true
  write_witness_paths: true
  write_alternative_decisions: true
  write_network_overlay_svg: true
  write_local_preview_tiles: true
  export_formats: [parquet, json, markdown, xlsx, html]
