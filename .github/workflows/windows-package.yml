name: Windows Offline Package

on:
  # Tag push (preferred release path)
  push:
    tags:
      - "v*"
  # Official GitHub Release published/edited
  release:
    types: [published, edited]
  # Manual fallback for dry-runs / cache seeding
  workflow_dispatch:
    inputs:
      build_installer:
        description: "Build NSIS installer when ODA resources are available"
        type: boolean
        default: true
      force_skip_oda:
        description: "Skip ODA-dependent packaging and only run contract tests"
        type: boolean
        default: false
      upload_release_assets:
        description: "Attach installer to the GitHub Release for this tag (tag-only)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: windows-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-windows:
    name: Package Windows Desktop
    runs-on: windows-latest
    timeout-minutes: 120
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For tag builds, resolve the exact tagged commit.
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Install Python package and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pyinstaller

      - name: Install desktop npm dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Packaging contract tests
        run: |
          python -m pytest -q `
            tests/unit/test_desktop_packaging.py `
            tests/unit/test_readers.py `
            tests/unit/test_oda_health.py

      - name: Restore staged ODA resources
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.force_skip_oda != true }}
        id: oda_cache
        uses: actions/cache@v4
        with:
          path: apps/desktop/src-tauri/resources/oda
          key: oda-file-converter-windows-v1
          restore-keys: |
            oda-file-converter-windows-

      - name: Detect ODA availability
        id: oda
        run: |
          $odaExe = "apps/desktop/src-tauri/resources/oda/ODAFileConverter.exe"
          $available = Test-Path $odaExe
          if ($env:FORCE_SKIP -eq "true") {
            $available = $false
          }
          "available=$([string]::Equals($available.ToString(), 'True', [System.StringComparison]::OrdinalIgnoreCase))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($available) {
            Write-Host "ODA resources available at $odaExe"
          } else {
            Write-Host "ODA resources missing. Installer build will be skipped unless cache is seeded."
          }
        env:
          FORCE_SKIP: ${{ github.event_name == 'workflow_dispatch' && inputs.force_skip_oda || false }}

      - name: Decide whether to build installer
        id: plan
        run: |
          $shouldBuild = $false
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            if ($env:BUILD_INSTALLER -eq "true" -and $env:ODA_AVAILABLE -eq "true") {
              $shouldBuild = $true
            }
          } elseif ($env:ODA_AVAILABLE -eq "true") {
            # tag push / GitHub Release always attempt installer build
            $shouldBuild = $true
          }
          "build=$([string]::Equals($shouldBuild.ToString(), 'True', [System.StringComparison]::OrdinalIgnoreCase))" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Installer build planned: $shouldBuild"
        env:
          EVENT_NAME: ${{ github.event_name }}
          BUILD_INSTALLER: ${{ github.event_name == 'workflow_dispatch' && inputs.build_installer || true }}
          ODA_AVAILABLE: ${{ steps.oda.outputs.available }}

      - name: Build Python sidecar
        if: ${{ steps.plan.outputs.build == 'true' }}
        working-directory: apps/desktop
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/build-sidecar.ps1 -Clean

      - name: Build desktop frontend
        if: ${{ steps.plan.outputs.build == 'true' }}
        working-directory: apps/desktop
        run: npm run build

      - name: Build Tauri NSIS installer
        if: ${{ steps.plan.outputs.build == 'true' }}
        working-directory: apps/desktop
        run: npm run tauri:build

      - name: Upload NSIS installer artifact
        if: ${{ steps.plan.outputs.build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dwg-audit-desktop-windows-nsis
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Attach installer to GitHub Release
        if: ${{ steps.plan.outputs.build == 'true' && (github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && inputs.upload_release_assets)) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || '' }}
        run: |
          $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer not found for release upload."
          }

          $tag = $env:RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ($env:GITHUB_REF -like "refs/tags/*") {
              $tag = $env:GITHUB_REF.Substring("refs/tags/".Length)
            } else {
              throw "No release tag available for asset upload."
            }
          }

          Write-Host "Uploading $($installer.Name) to release $tag"
          # Ensure a release object exists for pure tag pushes.
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated Windows offline installer for $tag" --verify-tag
          }
          gh release upload $tag $installer.FullName --clobber

      - name: Summarize packaging outcome
        if: always()
        run: |
          $lines = @()
          $lines += "## Windows packaging"
          $lines += ""
          $lines += "- Trigger: ${{ github.event_name }} (`${{ github.ref }}`)"
          $lines += "- Contract tests: executed"
          $lines += "- ODA resources available: ${{ steps.oda.outputs.available }}"
          $lines += "- Installer build planned: ${{ steps.plan.outputs.build }}"
          if ("${{ steps.plan.outputs.build }}" -eq "true") {
            $installer = Get-ChildItem "apps/desktop/src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($installer) {
              $lines += "- Installer: `$($installer.FullName)` ($([math]::Round($installer.Length / 1MB, 1)) MB)"
            } else {
              $lines += "- Installer: not produced"
            }
          } else {
            $lines += "- Installer build skipped"
            $lines += "- Seed Actions cache key ``oda-file-converter-windows-v1`` or build locally"
            $lines += "- Local guide: ``doc/windows-packaging.md``"
          }
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
