project:
  name: ""
  skip_files:
    - "封面"
    - "目录"
    - "屏面布置"
    - "标牌"
  skip_globs:
    - "*~1.DWG"
    - "*.bak"
    - "*.lck"
  audit_primary_categories:
    - "二次原理图"
  audit_secondary_categories:
    - "背板接线图"
    - "元件接线图"
    - "屏端子图"
    - "屏面布置图"
    - "封面/目录"
  audit_supplemental_categories: []
  audit_primary_title_keywords:
    - "回路"
    - "信号"
    - "保护"
    - "出口"
    - "操作"
    - "开入"
    - "控制"
  audit_secondary_title_keywords:
    - "背板"
    - "端子图"
    - "元件接线图"
    - "接线图"
    - "布置"
    - "封面"
    - "目录"
    - "标牌"

ingest:
  dwg_reader: "odafc"
  odafc_path: "C:\\Program Files\\ODA\\ODAFileConverter 27.1.0\\ODAFileConverter.exe"
  convert_version: "R2018"
  audit_before_load: true
  ascii_stage_dir: ".cache/odafc_stage"

layout:
  page_no_source_priority:
    - "prj"
    - "title_block"
    - "filename"
    - "manual"
  audit_area:
    mode: "auto"
    manual_bbox: null
    bottom_trim_ratio: 0.16
    side_trim_ratio: 0.02
  title_block:
    mode: "auto"
    manual_bbox: null
    width_ratio: 0.28
    height_ratio: 0.22

geometry:
  horizontal_angle_tolerance_deg: 2.0
  min_wire_length: 12.0
  line_y_tolerance: 1.8
  line_gap_tolerance: 4.0
  inline_numeric_bridge_gap: 13.0
  inline_numeric_bridge_y_tolerance: 4.0
  endpoint_search_radius_x: 18.0
  endpoint_search_radius_y: 7.0
  grid_band_y_tolerance: 5.0
  grid_min_band_count: 8

topology:
  geometry_graph_asserted_snap_tolerance: 0.05
  geometry_graph_marker_max_span: 1.0
  geometry_graph_marker_match_tolerance: 0.75
  geometry_graph_possible_gap_tolerance: 25.0
  geometry_graph_gap_alignment_tolerance: 0.25

text:
  numeric_pattern: "^[0-9]+$"
  allow_suffix: false
  min_text_height: 1.0
  max_text_height: 8.0
  top_k_per_side: 3
  deprioritized_layers:
    - "DIM"
    - "MARK"
  deprioritized_layer_penalty: 0.03
  single_char_penalty_layers:
    - "DIM"
    - "MARK"
  single_char_penalty: 0.12
  single_char_reject_layers: []
  block_internal_numeric_penalty: -0.15

extract:
  insert_virtual_entity_categories:
    - "元件接线图"
    - "背板接线图"

recognition:
  primary_engine: "legacy"
  legacy_neighborhood:
    mode: "shadow-compatible"
    allow_for_text_candidates: true
    allow_for_connectivity: false
    allow_for_final_pair: false

wire_components:
  inline_body_families:
    - "KLP"
    - "ZKK"

symbol_library:
  path: null

table_structure:
  axis_tolerance: 0.5
  intersection_tolerance: 0.5
  min_axis_count: 3

page_category_overrides:
  二次原理图:
    text:
      single_char_reject_layers:
        - "DIM"
        - "MARK"
  元件接线图:
    geometry:
      line_group_orientation: "auto"
    text:
      numeric_suffix_patterns:
        - "(?i)n(?P<value>\\d{3,})$"
        - "(?i)(?:CD|GD|ZK-?)(?P<value>\\d{1,3})$"
        - "(?i)HD(?P<value>\\d{1,3})$"
      derived_numeric_penalty: -0.18
      virtual_single_char_reject_blocks:
        - "FJL-25-2A_Mirror"
  屏端子图:
    geometry:
      endpoint_search_radius_x: 30.0
    text:
      numeric_suffix_patterns:
        - "(?i)n(?P<value>\\d{3,})$"
      derived_numeric_penalty: -0.08
      terminal_strip_bypass_patterns:
        - "未定义.*回路图"
        - "说明"
        - "^上接"
        - "^下接"
        - "^(?:ZD|3-21UD|3-21ID|3-21GD|3-21QD)$"
      terminal_strip_distance_x_weight: 0.2
      terminal_strip_distance_y_weight: 0.45

confidence:
  high_threshold: 0.92
  review_threshold: 0.75

rules:
  enable:
    - "R-PAIR-MISSING-SIDE"
    - "R-PAIR-LOW-CONFIDENCE"
    - "R-DUPLICATE-SAME-LINE"
    - "R-CROSS-PAGE-CONFLICT"
    - "R-SEMANTIC-MAPPING-CONFLICT"
    - "R-TABLE-MAPPING-SOURCE-CONFLICT"
    - "R-ONE-TO-MANY"
    - "R-MANY-TO-ONE"
    - "R-MISSING-RECIPROCAL"
    - "R-DUPLICATE-PAIR"
    - "R-SHEET-PAGE-MISMATCH"
  reciprocal_required: false
  one_to_many_branch_left_values: []

report:
  include_low_confidence_pairs: true
  include_candidate_details: true
  export_formats:
    - "xlsx"
    - "html"
    - "md"

runtime:
  persist_page_findings_files: false
